<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#faf7f0">
  <title>Days Since</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌱%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌱%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="auth-view" class="auth" hidden>
    <h1 class="auth-title">Days Since</h1>
    <p class="auth-sub">Sign in with email — we'll send you a link.</p>
    <form id="signin-form" class="auth-form">
      <input id="signin-email" type="email" required placeholder="you@example.com" autocomplete="email" inputmode="email">
      <button type="submit" class="btn-primary">Send link</button>
    </form>
    <p id="signin-status" class="auth-status" aria-live="polite"></p>
  </main>

  <main id="app-view" hidden>
    <ul id="list" class="list"></ul>
    <p id="empty" class="empty" hidden>No trackers yet.<br>Tap + to add one.</p>
    <p class="footer"><button id="signout-btn" type="button" class="link-btn">Sign out</button></p>
  </main>

  <main id="loading-view" class="loading">
    <p>Loading…</p>
  </main>

  <button id="add-btn" class="add-btn" aria-label="Add tracker" hidden>+</button>

  <dialog id="edit-dialog" class="dialog">
    <form id="edit-form" method="dialog">
      <h2 id="edit-title">New tracker</h2>
      <label>
        <span>Name</span>
        <input id="edit-name" type="text" required maxlength="80" autocomplete="off">
      </label>
      <label>
        <span>Every how many days?</span>
        <input id="edit-interval" type="number" min="1" max="3650" required inputmode="numeric">
      </label>
      <div class="dialog-actions">
        <button type="button" id="edit-delete" class="btn-danger" hidden>Delete</button>
        <span class="spacer"></span>
        <button type="button" id="edit-cancel" class="btn-text">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
