<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#faf7f0">
  <title>Days Since</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌱%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌱%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="app">
    <ul id="list" class="list"></ul>
    <p id="empty" class="empty" hidden>No trackers yet.<br>Tap + to add one.</p>
  </main>

  <button id="add-btn" class="add-btn" aria-label="Add tracker">+</button>

  <dialog id="edit-dialog" class="dialog">
    <form id="edit-form" method="dialog">
      <h2 id="edit-title">New tracker</h2>
      <label>
        <span>Name</span>
        <input id="edit-name" type="text" required maxlength="40" autocomplete="off">
      </label>
      <label>
        <span>Every how many days?</span>
        <input id="edit-interval" type="number" min="1" max="365" required inputmode="numeric">
      </label>
      <div class="dialog-actions">
        <button type="button" id="edit-delete" class="btn-danger" hidden>Delete</button>
        <span class="spacer"></span>
        <button type="button" id="edit-cancel" class="btn-text">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
